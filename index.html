<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Memory: Speedrun Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+TC:wght@400;700&display=swap');
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background-color: #020205; font-family: 'Cinzel', 'Noto Serif TC', serif; 
            user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
/**
 * ROYAL MEMORY: SPEEDRUN MASTER
 * 核心更新：單人10題計時榜、多人無提示不洗牌/有提示洗牌制、極致對齊
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const STATE = { INIT: 0, LOBBY: 1, SETTINGS: 2, CHAR_SELECT: 3, PLAYING: 4, GAME_OVER: 5, ENTER_NAME: 6, LEADERBOARD: 7 };
const CHARS = [
    { name: "亞瑟國王", icon: "👑", color: "#FFD700" }, { name: "伊莎皇后", icon: "👸", color: "#FF69B4" },
    { name: "蘭斯騎士", icon: "🛡️", color: "#4facfe" }, { name: "葛溫公主", icon: "✨", color: "#ee9ca7" },
    { name: "路易親王", icon: "🦅", color: "#bdc3c7" }, { name: "艾琳女爵", icon: "🌿", color: "#00b09b" },
    { name: "凱恩大公", icon: "⚒️", color: "#8e44ad" }, { name: "索菲賢者", icon: "📜", color: "#f39c12" }
];

const TOTAL_ROUNDS = 10; // 固定 10 題

let state = STATE.INIT;
let vw = window.innerWidth, vh = window.innerHeight;
let buttons = [], particles = [], cards = [];
let shake = 0, lockInput = false;

// 遊戲設定
let settings = { volM: 0.25, volS: 0.5, isDragM: false, isDragS: false, hintTime: 0 };
let players = [], currentPlayerIdx = 0, currentRound = 1;
let nextTarget = 1, timer = 0, steps = 0;
let leaderboard = [];
let inputName = "";

// --- 空靈水晶音效引擎 ---
let audioCtx, musicGain, sfxGain;
let bgmNodes = [];
let bgmInterval = null;
let currentMusicType = '';

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    musicGain = audioCtx.createGain(); sfxGain = audioCtx.createGain();
    musicGain.gain.value = settings.volM; sfxGain.gain.value = settings.volS;
    musicGain.connect(audioCtx.destination); sfxGain.connect(audioCtx.destination);
    playMusic('LOBBY');
}

function updateAudioVols() {
    if (musicGain) musicGain.gain.setTargetAtTime(settings.volM, audioCtx.currentTime, 0.1);
    if (sfxGain) sfxGain.gain.setTargetAtTime(settings.volS, audioCtx.currentTime, 0.1);
}

function stopMusic() {
    if (bgmInterval) clearInterval(bgmInterval);
    const now = audioCtx ? audioCtx.currentTime : 0;
    bgmNodes.forEach(node => {
        try {
            node.gain.gain.cancelScheduledValues(now);
            node.gain.gain.linearRampToValueAtTime(0, now + 1);
            node.osc.stop(now + 1.1);
            if (node.lfo) node.lfo.stop(now + 1.1);
        } catch(e) {}
    });
    bgmNodes = []; currentMusicType = '';
}

function playMusic(type) {
    if (!audioCtx || currentMusicType === type) return;
    stopMusic(); currentMusicType = type;
    const now = audioCtx.currentTime;

    if (type === 'LOBBY') {
        const freqs = [130.81, 196.00, 246.94, 293.66, 329.63]; 
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            const lfo = audioCtx.createOscillator(); const lfoGain = audioCtx.createGain();
            
            osc.type = i % 2 === 0 ? 'sine' : 'triangle'; osc.frequency.value = f + (Math.random()*0.6 - 0.3);
            lfo.type = 'sine'; lfo.frequency.value = 0.05 + i * 0.01; lfoGain.gain.value = 0.04;
            lfo.connect(lfoGain); lfoGain.connect(gain.gain); lfo.start(now);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.06, now + 3);
            
            osc.connect(gain); gain.connect(musicGain); osc.start(now);
            bgmNodes.push({ osc: osc, gain: gain, lfo: lfo });
        });
    } else if (type === 'GAME') {
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; 
        bgmInterval = setInterval(() => {
            if(!audioCtx || state !== STATE.PLAYING) return;
            const t = audioCtx.currentTime;
            
            const kick = audioCtx.createOscillator(); const kickGain = audioCtx.createGain();
            kick.type = 'sine'; kick.frequency.setValueAtTime(80, t); kick.frequency.exponentialRampToValueAtTime(20, t + 0.4);
            kickGain.gain.setValueAtTime(0.3, t); kickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            kick.connect(kickGain); kickGain.connect(musicGain); kick.start(t); kick.stop(t + 0.5);

            if (Math.random() > 0.4) {
                const pluck = audioCtx.createOscillator(); const pluckGain = audioCtx.createGain();
                pluck.type = 'sine'; pluck.frequency.value = scale[Math.floor(Math.random() * scale.length)];
                pluckGain.gain.setValueAtTime(0, t); pluckGain.gain.linearRampToValueAtTime(0.15, t + 0.02); 
                pluckGain.gain.exponentialRampToValueAtTime(0.001, t + 2.0); 
                pluck.connect(pluckGain); pluckGain.connect(musicGain); pluck.start(t); pluck.stop(t + 2.1);
            }
        }, 1000);
    }
}

function playSFX(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime; const g = audioCtx.createGain(); const osc = audioCtx.createOscillator();
    osc.connect(g); g.connect(sfxGain);

    if (type === 'CLICK') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'CORRECT') {
        osc.type = 'sine'; const note = 523.25 * Math.pow(1.059, nextTarget * 2); osc.frequency.setValueAtTime(note, now);
        g.gain.setValueAtTime(0, now); g.gain.linearRampToValueAtTime(0.3, now + 0.02); g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
    } else if (type === 'WRONG') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        g.gain.setValueAtTime(0.4, now); g.gain.linearRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    }
}

// --- 核心佈局與 UI ---
function resize() { vw = canvas.width = window.innerWidth; vh = canvas.height = window.innerHeight; updateUI(); }

function updateUI() {
    buttons = [];
    const cx = vw / 2, cy = vh / 2;
    const isMobile = vw < 800;

    if (state === STATE.LOBBY) {
        addButton(cx - 120, cy + 20, 240, 60, "啟動大師試煉", () => { state = STATE.CHAR_SELECT; players=[]; updateUI(); playSFX('CLICK'); });
        addButton(cx - 120, cy + 100, 240, 50, "試煉設定", () => { state = STATE.SETTINGS; updateUI(); playSFX('CLICK'); });
        addButton(cx - 120, cy + 170, 240, 50, "英雄榜 (單人)", () => { state = STATE.LEADERBOARD; updateUI(); playSFX('CLICK'); });
    } 
    else if (state === STATE.SETTINGS) {
        const sw = isMobile ? vw * 0.8 : 350;
        const startX = cx - sw/2;
        const sy = 150;

        addButton(startX, sy, sw, 30, "音樂音量", null, 'sliderM');
        addButton(startX, sy + 70, sw, 30, "音效音量", null, 'sliderS');
        addButton(startX, sy + 140, sw, 50, "全螢幕模式", toggleFS);
        
        // 提示秒數決定洗牌模式
        let hintModeText = settings.hintTime === 0 ? "記憶傳承 (無提示/失敗不洗牌)" : `混沌洗牌 (提示: ${settings.hintTime} 秒)`;
        addButton(startX, sy + 210, sw, 50, hintModeText, () => { 
            settings.hintTime = (settings.hintTime + 1) % 4; // 0, 1, 2, 3 秒
            updateUI(); playSFX('CLICK'); 
        });

        addButton(cx - 100, vh - 100, 200, 50, "⬅ 返回大廳", () => { state = STATE.LOBBY; updateUI(); playSFX('CLICK'); });
    }
    else if (state === STATE.CHAR_SELECT) {
        addButton(20, 20, 100, 45, "⬅ 返回", () => { state = STATE.LOBBY; updateUI(); playSFX('CLICK'); });
        if (players.length > 0) {
            addButton(cx - 120, vh - 90, 240, 60, "進入聖域", startGame);
        }
    } 
    else if (state === STATE.PLAYING) {
        recalcCards();
        addButton(vw - 100, vh - 60, 80, 40, "放棄", () => { gameOver(); playSFX('CLICK'); });
    }
    else if (state === STATE.GAME_OVER) {
        addButton(cx - 120, vh - 100, 240, 60, "返回大廳", () => { state = STATE.LOBBY; updateUI(); playSFX('CLICK'); });
    }
    else if (state === STATE.ENTER_NAME) { buildKeyboard(); }
    else if (state === STATE.LEADERBOARD) {
        addButton(cx - 100, vh - 100, 200, 50, "⬅ 返回大廳", () => { state = STATE.LOBBY; updateUI(); playSFX('CLICK'); });
    }
}

function buildKeyboard() {
    const keys = [['Q','W','E','R','T','Y','U','I','O','P'], ['A','S','D','F','G','H','J','K','L'], ['Z','X','C','V','B','N','M','DEL','ENTER']];
    const kw = Math.min(vw * 0.08, 60), kh = 50, gap = 8, sy = vh - 220;
    
    keys.forEach((row, rIdx) => {
        const rowW = row.length * kw + (row.length - 1) * gap;
        const sx = vw/2 - rowW/2;
        row.forEach((k, cIdx) => {
            let bw = kw; if (k === 'DEL' || k === 'ENTER') bw = kw * 1.5;
            let accX = sx; for(let i=0; i<cIdx; i++) accX += (row[i]==='DEL'||row[i]==='ENTER' ? kw*1.5 : kw) + gap;
            addButton(accX, sy + rIdx * (kh + gap), bw, kh, k, () => handleKey(k), 'key');
        });
    });
}

function handleKey(k) {
    playSFX('CLICK');
    if (k === 'DEL') inputName = inputName.slice(0, -1);
    else if (k === 'ENTER') {
        if (inputName.trim() === "") inputName = "ANONYMOUS";
        saveScore();
    }
    else if (inputName.length < 10) inputName += k;
}

function saveScore() {
    const p = players[0]; 
    leaderboard.push({ name: inputName, time: timer, icon: CHARS[p.charIdx].icon });
    // 排行榜：單人時間越短排名越高 (升序排列)
    leaderboard.sort((a, b) => a.time - b.time);
    if (leaderboard.length > 10) leaderboard.length = 10; 
    
    playMusic('LOBBY'); state = STATE.LEADERBOARD; updateUI();
}

function addButton(x, y, w, h, txt, cb, type = 'btn') { buttons.push({ x, y, w, h, txt, cb, type }); }
function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
    playSFX('CLICK');
}

// --- 遊戲邏輯 ---
function startGame() {
    playSFX('CLICK');
    currentPlayerIdx = 0; currentRound = 1; timer = 0;
    players.forEach(p => { p.score = 0; }); // 多人競賽的 score 紀錄勝出題數
    playMusic('GAME'); initRound();
}

function initRound() {
    state = STATE.PLAYING; nextTarget = 1; steps = 0; lockInput = false;

    let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
    cards = nums.map(n => ({ id: n, isFlipped: false, isSolved: false, x:0, y:0, w:0, h:0 }));
    recalcCards(); updateUI(); 

    if (settings.hintTime > 0) showHint();
}

function showHint() {
    lockInput = true;
    cards.forEach(c => c.isFlipped = true);
    setTimeout(() => { 
        if(state === STATE.PLAYING) { 
            cards.forEach(c => c.isFlipped = false); 
            lockInput = false; 
        } 
    }, settings.hintTime * 1000);
}

function recalcCards() {
    if (state !== STATE.PLAYING) return;
    const isMobile = vw < 800;
    const sidebarW = isMobile ? 100 : 220; 
    const topMargin = 120, bottomMargin = 80;

    const availableH = vh - topMargin - bottomMargin;
    const availableW = vw - sidebarW; 
    const area = Math.min(availableW * 0.9, availableH); 
    const size = area / 3.5;
    const gap = area * 0.05;
    
    const sx = sidebarW + (availableW - (size * 3 + gap * 2)) / 2;
    const sy = topMargin + (availableH - (size * 3 + gap * 2)) / 2;

    cards.forEach((c, i) => {
        c.x = sx + (i%3)*(size+gap); c.y = sy + Math.floor(i/3)*(size+gap); c.w = size; c.h = size;
    });
}

function handleInput(x, y, isDown, isMove = false) {
    if (state === STATE.INIT) { if(isDown) { initAudio(); state = STATE.LOBBY; updateUI(); } return; }

    const sM = buttons.find(b => b.type === 'sliderM');
    const sS = buttons.find(b => b.type === 'sliderS');
    if (sM && isDown && x > sM.x && x < sM.x + sM.w && y > sM.y - 20 && y < sM.y + 50) settings.isDragM = true;
    if (sS && isDown && x > sS.x && x < sS.x + sS.w && y > sS.y - 20 && y < sS.y + 50) settings.isDragS = true;
    
    if (settings.isDragM) {
        if (!isDown && !isMove) { settings.isDragM = false; return; }
        settings.volM = Math.max(0, Math.min(1, (x - sM.x) / sM.w));
        updateAudioVols(); return;
    }
    if (settings.isDragS) {
        if (!isDown && !isMove) { settings.isDragS = false; return; }
        settings.volS = Math.max(0, Math.min(1, (x - sS.x) / sS.w));
        updateAudioVols(); return;
    }

    if (!isDown || isMove) return;

    for (let b of buttons) {
        if (b.cb && x > b.x && x < b.x + b.w && y > b.y && y < b.y + b.h) { b.cb(); return; }
    }

    if (state === STATE.CHAR_SELECT) {
        const gridW = 90, gridH = 120, spX = 100, spY = 140;
        const startX = vw/2 - (4 * spX - 10) / 2, startY = vh * 0.3;
        CHARS.forEach((c, i) => {
            const bx = startX + (i % 4) * spX, by = startY + Math.floor(i / 4) * spY;
            if (x > bx && x < bx + gridW && y > by && y < by + gridH) {
                const fIdx = players.findIndex(p => p.charIdx === i);
                if (fIdx > -1) players.splice(fIdx, 1);
                else if (players.length < 4) players.push({ charIdx: i, score: 0, name: c.name });
                playSFX('CLICK'); updateUI();
            }
        });
    }

    if (state === STATE.PLAYING && !lockInput) {
        cards.forEach(c => {
            if (!c.isFlipped && !c.isSolved && x > c.x && x < c.x + c.w && y > c.y && y < c.y + c.h) { onCardClick(c); }
        });
    }
}

function onCardClick(c) {
    steps++; c.isFlipped = true;
    if (c.id === nextTarget) {
        c.isSolved = true; nextTarget++; playSFX('CORRECT');
        spawnParticles(c.x + c.w/2, c.y + c.h/2, "#FFD700");
        
        if (nextTarget > 9) { 
            lockInput = true; 
            players[currentPlayerIdx].score++; // 多人模式：累積勝利題數

            setTimeout(() => {
                currentRound++;
                if (currentRound > TOTAL_ROUNDS) { gameOver(); } 
                else {
                    // 下一題換下一位玩家先攻
                    if (players.length > 1) currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
                    initRound();
                }
            }, 800); 
        }
    } else {
        lockInput = true; shake = 15; playSFX('WRONG');
        spawnParticles(c.x + c.w/2, c.y + c.h/2, "#FF3300");
        
        setTimeout(() => {
            cards.forEach(card => { card.isFlipped = false; card.isSolved = false; });
            nextTarget = 1; lockInput = false;
            
            // 換下一位挑戰者
            if (players.length > 1) {
                currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
            }

            // 根據提示秒數決定洗牌模式
            if (settings.hintTime > 0) {
                // 有提示：洗牌並顯示提示
                let activeIds = cards.map(card => card.id).sort(() => Math.random() - 0.5);
                cards.forEach((card, idx) => card.id = activeIds[idx]);
                showHint();
            } 
            // 若為 0 秒：不洗牌也不提示，牌的順序保留
        }, 1000);
    }
}

function gameOver() {
    playMusic('LOBBY');
    // 只有單人模式會進入英雄榜名單輸入
    if (players.length === 1 && currentRound > TOTAL_ROUNDS) {
        state = STATE.ENTER_NAME; inputName = "";
    } else {
        state = STATE.GAME_OVER; 
    }
    updateUI();
}

// --- 渲染系統 ---
function draw() {
    ctx.fillStyle = "#020205"; ctx.fillRect(0, 0, vw, vh);

    if (shake > 0) { ctx.save(); ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2); shake *= 0.85; }

    switch(state) {
        case STATE.INIT: drawInit(); break;
        case STATE.LOBBY: drawLobby(); break;
        case STATE.SETTINGS: drawSettings(); break;
        case STATE.CHAR_SELECT: drawCharSelect(); break;
        case STATE.PLAYING: drawGame(); break;
        case STATE.GAME_OVER: drawGameOver(); break;
        case STATE.ENTER_NAME: drawEnterName(); break;
        case STATE.LEADERBOARD: drawLeaderboard(); break;
    }

    drawParticles(); drawButtons();
    if (shake > 0) ctx.restore();

    if (state === STATE.PLAYING) { timer += 1/60; }
    requestAnimationFrame(draw);
}

function drawInit() {
    drawText("GRAND MASTER", vw/2, vh/2 - 30, 55, "#FFD700", true);
    drawText("SPEEDRUN", vw/2, vh/2 + 25, 35, "#D4AF37", true);
    drawText("點擊喚醒古代試煉", vw/2, vh/2 + 100, 18, "#88a");
}

function drawLobby() { drawText("聖域：記憶大師", vw/2, vh * 0.25, 50, "#FFD700", true); }
function drawSettings() { drawText("試煉配置總機", vw/2, 60, 36, "#FFD700", true); }

function drawCharSelect() {
    drawText(`集結英雄 (單人競速 / 多人搶分)`, vw/2, 70, 28, "#FFD700");
    const gridW = 90, gridH = 120, spX = 100, spY = 140;
    const startX = vw/2 - (4 * spX - 10) / 2, startY = vh * 0.3;

    CHARS.forEach((c, i) => {
        const bx = startX + (i % 4) * spX, by = startY + Math.floor(i / 4) * spY;
        const pNum = players.findIndex(p => p.charIdx === i) + 1;
        ctx.fillStyle = pNum ? "rgba(255,215,0,0.15)" : "rgba(255,255,255,0.02)";
        ctx.strokeStyle = pNum ? c.color : "rgba(255,255,255,0.08)";
        roundRect(bx, by, gridW, gridH, 10, true, true);
        drawText(c.icon, bx + gridW/2, by + gridH * 0.45, 40, "#FFF");
        drawText(c.name, bx + gridW/2, by + gridH * 0.8, 14, pNum ? c.color : "#666");
        if (pNum) {
            ctx.fillStyle = "#FF4500"; ctx.beginPath(); ctx.arc(bx + gridW, by, 12, 0, Math.PI*2); ctx.fill();
            drawText("P"+pNum, bx + gridW, by + 5, 12, "#FFF");
        }
    });
}

function drawGame() {
    const isMobile = vw < 800;
    const sidebarW = isMobile ? 100 : 220;

    // 左側面板
    ctx.fillStyle = "rgba(10, 10, 15, 0.95)"; ctx.fillRect(0, 0, sidebarW, vh);
    ctx.strokeStyle = "rgba(212, 175, 55, 0.4)"; ctx.beginPath(); ctx.moveTo(sidebarW, 0); ctx.lineTo(sidebarW, vh); ctx.stroke();

    const blockH = isMobile ? 100 : 130;
    const startY = Math.max(50, (vh - (players.length * blockH)) / 2);

    players.forEach((p, i) => {
        const c = CHARS[p.charIdx];
        const isActive = i === currentPlayerIdx;
        const py = startY + i * blockH;

        if (isActive) {
            ctx.fillStyle = "rgba(255, 215, 0, 0.2)"; ctx.fillRect(0, py - 10, sidebarW, blockH - 10);
            ctx.fillStyle = "#FFD700"; ctx.fillRect(0, py - 10, 5, blockH - 10);
        }

        if (players.length === 1) {
            drawText(c.icon, sidebarW / 2, py + 35, isMobile ? 40 : 60, "#FFF");
            if (!isMobile) drawText(c.name, sidebarW / 2, py + 80, 18, c.color);
        } else {
            drawText(c.icon, sidebarW / 2, py + 25, isMobile ? 35 : 50, "#FFF");
            let scoreTxt = `${p.score} 勝`;
            if (!isMobile) {
                drawText(c.name, sidebarW / 2, py + 55, 16, c.color);
                drawText(scoreTxt, sidebarW / 2, py + 85, 24, "#FFF", true);
            } else { drawText(scoreTxt, sidebarW / 2, py + 65, 18, "#FFF", true); }
        }
    });

    const cx = sidebarW + (vw - sidebarW) / 2;
    drawText(`ROUND ${currentRound} / ${TOTAL_ROUNDS}`, cx, 50, 24, "#FFD700", true);
    drawText(formatTime(timer), cx, 90, 26, "#FFF");

    cards.forEach(c => {
        ctx.save(); ctx.translate(c.x + c.w/2, c.y + c.h/2);
        const grad = ctx.createLinearGradient(-c.w/2, -c.h/2, c.w/2, c.h/2);
        if (c.isFlipped || c.isSolved) { grad.addColorStop(0, "#fffaf0"); grad.addColorStop(1, "#d4af37"); } 
        else { grad.addColorStop(0, "#1a1a2e"); grad.addColorStop(1, "#0d0d1a"); }
        
        ctx.fillStyle = grad;
        if (c.isSolved) { ctx.shadowBlur = 20; ctx.shadowColor = "#FFD700"; }
        ctx.strokeStyle = c.isSolved ? "#FFF" : "rgba(212,175,55,0.3)";
        roundRect(-c.w/2, -c.h/2, c.w, c.h, 15, true, true);
        
        // 數字絕對置中
        if (c.isFlipped || c.isSolved) drawText(c.id, 0, 0, c.w * 0.45, "#111");
        ctx.restore();
    });
}

function drawGameOver() {
    drawText("試煉終焉", vw/2, 80, 50, "#FFD700", true);
    if (players.length > 1) {
        let sorted = [...players].sort((a,b) => b.score - a.score);
        sorted.forEach((p, i) => {
            const c = CHARS[p.charIdx];
            drawText(`${i+1}. ${c.icon} ${c.name} - 贏得 ${p.score} 題`, vw/2, 180 + i * 50, 26, c.color);
        });
    } else {
        drawText(`總耗時: ${formatTime(timer)}`, vw/2, 200, 32, "#FFF", true);
    }
}

function drawEnterName() {
    drawText("締造傳奇", vw/2, 100, 45, "#FFD700", true);
    drawText("請輸入大名以鐫刻於聖域之柱", vw/2, 150, 18, "#aaa");
    drawText(`成績: ${formatTime(timer)}`, vw/2, 185, 22, "#FFD700");
    
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.strokeStyle = "#D4AF37";
    roundRect(vw/2 - 200, 220, 400, 60, 10, true, true);
    drawText(inputName + (Math.floor(Date.now()/500)%2===0 ? "_" : ""), vw/2, 250, 32, "#FFF");
}

function drawLeaderboard() {
    drawText("聖域英雄榜 (單人競速)", vw/2, 70, 40, "#FFD700", true);
    if (leaderboard.length === 0) { drawText("尚無傳奇誕生", vw/2, 200, 24, "#666"); } 
    else {
        leaderboard.forEach((l, i) => {
            const y = 150 + i * 40;
            drawText(`${i+1}. ${l.icon} ${l.name}`, vw/2 - 150, y, 22, "#FFF", false, 'left');
            drawText(formatTime(l.time), vw/2 + 150, y, 22, "#FFD700", false, 'right');
        });
    }
}

// 格式化時間 (MM:SS.ms)
function formatTime(s) { 
    let m = Math.floor(s / 60); 
    let sec = (s % 60).toFixed(2); 
    return m > 0 ? `${m}:${sec.padStart(5, '0')}` : `${sec}s`; 
}

// 文字渲染核心 (絕對置中)
function drawText(txt, x, y, size, col, glow = false, align = 'center') {
    ctx.textAlign = align;
    ctx.textBaseline = 'middle'; 
    ctx.fillStyle = col; 
    if (glow) { ctx.shadowBlur = 15; ctx.shadowColor = col; } else { ctx.shadowBlur = 0; }
    ctx.font = `bold ${size}px 'Cinzel', 'Noto Serif TC', serif`;
    ctx.fillText(txt, x, y); 
    ctx.shadowBlur = 0;
}

function drawButtons() {
    buttons.forEach(b => {
        if (b.type === 'sliderM' || b.type === 'sliderS') {
            const barH = 12, fillW = (b.type==='sliderM'?settings.volM:settings.volS) * b.w;
            ctx.fillStyle = "#222"; roundRect(b.x, b.y, b.w, barH, 6, true, false);
            ctx.fillStyle = "#d4af37"; roundRect(b.x, b.y, fillW, barH, 6, true, false);
            ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(b.x + fillW, b.y + barH/2, 12, 0, Math.PI*2); ctx.fill();
            drawText(`${b.txt}: ${Math.round((b.type==='sliderM'?settings.volM:settings.volS)*100)}%`, b.x + b.w/2, b.y - 15, 16, "#aaa");
        } else if (b.type === 'key') {
            ctx.fillStyle = "rgba(40,40,50,0.8)"; ctx.strokeStyle = "#555";
            roundRect(b.x, b.y, b.w, b.h, 8, true, true);
            drawText(b.txt, b.x + b.w/2, b.y + b.h/2, b.txt.length > 1 ? 14 : 20, "#FFF");
        } else {
            ctx.fillStyle = "rgba(30, 30, 40, 0.7)"; ctx.strokeStyle = "rgba(212, 175, 55, 0.6)";
            roundRect(b.x, b.y, b.w, b.h, 12, true, true);
            drawText(b.txt, b.x + b.w/2, b.y + b.h/2, 20, "#e8d08b");
        }
    });
}

function roundRect(x, y, w, h, r, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
    if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

function spawnParticles(x, y, col) { for(let i=0; i<15; i++) particles.push({ x, y, col, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1 }); }

function drawParticles() {
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.03;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
        if (p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

window.addEventListener('resize', resize);
const handleEvent = (e, isDown, isMove) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    handleInput(x, y, isDown, isMove);
};
canvas.addEventListener('mousedown', e => handleEvent(e, true, false));
canvas.addEventListener('mousemove', e => handleEvent(e, false, true));
canvas.addEventListener('mouseup', () => handleInput(0, 0, false, false));
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleEvent(e, true, false); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleEvent(e, false, true); }, {passive: false});
canvas.addEventListener('touchend', () => handleInput(0, 0, false, false));
resize(); draw();
</script>
